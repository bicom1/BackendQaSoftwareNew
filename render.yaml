# Deploy from repo: https://github.com/bicom1/BackendQaSoftwareNew
# Render Dashboard → Environment → MONGO_URL (same value as BackendQaSoftware/.env)
# NEW cluster: mongodb+srv://qcdev_db_user:...@cluster0.3f5zxhd.mongodb.net/bicc?retryWrites=true&w=majority
# OLD cluster (commented): mongodb+srv://qcdev:...@bic.vifauen.mongodb.net/bicc?retryWrites=true&w=majority
services:
  - type: web
    name: backendqasoftware
    runtime: node
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://front-qa-software-new.vercel.app
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
