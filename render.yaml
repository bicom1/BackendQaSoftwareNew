# Deploy from repo: https://github.com/bicom1/BackendQaSoftwareNew
# Render Dashboard → New Web Service → connect this repo (root = repo root, not monorepo parent).
services:
  - type: web
    name: backendqasoftware
    runtime: node
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://front-qa-software-new.vercel.app
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
